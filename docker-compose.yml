# BOLA Lab — автономний стенд (gateway, auth, reports, web, PostgreSQL).
# Запуск: docker compose up --build
# Веб: http://localhost:3005 · Gateway: http://localhost:23456

name: bola-lab

networks:
  bola_internal:
    internal: true
  edge:
    driver: bridge

volumes:
  bola_pg:

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-bola}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bola_dev_only}
      POSTGRES_DB: ${POSTGRES_DB:-bola}
    volumes:
      - bola_pg:/var/lib/postgresql/data
    networks: [bola_internal]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-bola} -d ${POSTGRES_DB:-bola}"]
      interval: 3s
      timeout: 5s
      retries: 10

  auth:
    build: ./services/auth
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-bola}:${POSTGRES_PASSWORD:-bola_dev_only}@postgres:5432/${POSTGRES_DB:-bola}
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET in .env}
      JWT_EXPIRE_MINUTES: "60"
    depends_on:
      postgres:
        condition: service_healthy
    networks: [bola_internal]

  reports:
    build: ./services/reports
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-bola}:${POSTGRES_PASSWORD:-bola_dev_only}@postgres:5432/${POSTGRES_DB:-bola}
      GATEWAY_INTERNAL_TOKEN: ${GATEWAY_INTERNAL_TOKEN:?set GATEWAY_INTERNAL_TOKEN}
      REPORTS_AUTHZ_MODE: ${REPORTS_AUTHZ_MODE:-vulnerable}
    depends_on:
      postgres:
        condition: service_healthy
    networks: [bola_internal]

  gateway:
    build: ./gateway
    environment:
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET in .env}
      GATEWAY_INTERNAL_TOKEN: ${GATEWAY_INTERNAL_TOKEN:?set GATEWAY_INTERNAL_TOKEN}
      AUTH_UPSTREAM: http://auth:8000
      REPORTS_UPSTREAM: http://reports:8000
      PORT: "8080"
      REPORTS_AUTHZ_MODE: ${REPORTS_AUTHZ_MODE:-vulnerable}
    ports:
      - "23456:8080"
    depends_on:
      - auth
      - reports
    networks: [bola_internal, edge]

  web:
    build:
      context: ./frontend
      args:
        VITE_API_BASE: ""
    ports:
      - "3005:80"
    networks: [edge]
    depends_on:
      - gateway
